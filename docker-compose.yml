# Next.js + MongoDB Boilerplate - Docker Compose
# Development environment with MongoDB

# =============================================================================
# Networks
# =============================================================================
networks:
  app-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  mongodb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/mongodb

# =============================================================================
# Services
# =============================================================================
services:
  
  # ---------------------------------------------------------------------------
  # MongoDB Database - Development
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: boilerplate-mongodb
    restart: unless-stopped
    
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-app_db}
    
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # MongoDB Admin UI (Optional - use with 'docker compose --profile tools up')
  # ---------------------------------------------------------------------------
  mongo-express:
    image: mongo-express:1.0.0
    container_name: boilerplate-mongo-express
    restart: unless-stopped
    
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_ROOT_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_URL: mongodb://admin:${MONGODB_ROOT_PASSWORD:-admin123}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASS:-admin}
    
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    
    depends_on:
      mongodb:
        condition: service_healthy
    
    networks:
      - app-network
    
    profiles:
      - tools