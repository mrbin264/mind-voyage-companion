# Mind Voyage Companion - Docker Compose Configuration
# Complete development and production environment with MongoDB

# =============================================================================
# Networks - Isolated network for services
# =============================================================================
networks:
  mind-voyage-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# =============================================================================
# Volumes - Persistent data storage
# =============================================================================
volumes:
  mongodb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/mongodb
  mongodb_logs:
    driver: local

# =============================================================================
# Services
# =============================================================================
services:
  
  # ---------------------------------------------------------------------------
  # MongoDB Database Service
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: mind-voyage-mongodb
    restart: unless-stopped
    
    # Environment configuration
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-mindvoyage_admin_2025}
      MONGO_INITDB_DATABASE: mind_voyage_companion
      MONGODB_DATABASE: mind_voyage_companion
      MONGODB_USERNAME: ${MONGODB_USERNAME:-mindvoyage_user}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-mindvoyage_pass_2025}
    
    # Port mapping
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    
    # Volume mounts for data persistence
    volumes:
      - mongodb_data:/data/db
      - mongodb_logs:/var/log/mongodb
      - ./docker/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./docker/mongodb/mongod.conf:/etc/mongod.conf:ro
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    
    # Network
    networks:
      - mind-voyage-network
    
    # Command with configuration
    command: ["mongod", "--config", "/etc/mongod.conf"]

  # ---------------------------------------------------------------------------
  # Next.js Application Service - Development
  # ---------------------------------------------------------------------------
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
      args:
        - NODE_ENV=development
    
    container_name: mind-voyage-app-dev
    restart: unless-stopped
    
    # Environment configuration
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://${MONGODB_USERNAME:-mindvoyage_user}:${MONGODB_PASSWORD:-mindvoyage_pass_2025}@mongodb:27017/mind_voyage_companion?authSource=mind_voyage_companion
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your_nextauth_secret_here_min_32_chars}
    
    # Port mapping
    ports:
      - "${APP_PORT:-3000}:3000"
    
    # Volume mounts for development (hot reload)
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    
    # Dependencies
    depends_on:
      mongodb:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Network
    networks:
      - mind-voyage-network
    
    # Development specific
    stdin_open: true
    tty: true
    
    profiles:
      - development

  # ---------------------------------------------------------------------------
  # Next.js Application Service - Production
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        - NODE_ENV=production
    
    container_name: mind-voyage-app
    restart: unless-stopped
    
    # Environment configuration
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://${MONGODB_USERNAME:-mindvoyage_user}:${MONGODB_PASSWORD:-mindvoyage_pass_2025}@mongodb:27017/mind_voyage_companion?authSource=mind_voyage_companion
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your_nextauth_secret_here_min_32_chars}
      - PORT=3000
    
    # Port mapping
    ports:
      - "${APP_PORT:-3000}:3000"
    
    # Dependencies
    depends_on:
      mongodb:
        condition: service_healthy
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Network
    networks:
      - mind-voyage-network
    
    profiles:
      - production

  # ---------------------------------------------------------------------------
  # MongoDB Admin Interface (Optional)
  # ---------------------------------------------------------------------------
  mongo-express:
    image: mongo-express:1.0.0
    container_name: mind-voyage-mongo-express
    restart: unless-stopped
    
    # Environment configuration
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_ROOT_PASSWORD:-mindvoyage_admin_2025}
      ME_CONFIG_MONGODB_URL: mongodb://admin:${MONGODB_ROOT_PASSWORD:-mindvoyage_admin_2025}@mongodb:27017/?authSource=admin
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin123}
      ME_CONFIG_SITE_BASEURL: /mongo-admin/
    
    # Port mapping
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    
    # Dependencies
    depends_on:
      mongodb:
        condition: service_healthy
    
    # Network
    networks:
      - mind-voyage-network
    
    profiles:
      - tools