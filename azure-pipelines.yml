# Mind Voyage Companion - Azure DevOps Pipeline
# Next.js app with MongoDB deployment to Azure App Service

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - docs/*
      - README.md
      - design/*
      - .github/*

pr:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - docs/*
      - README.md
      - design/*

variables:
  - group: mind-voyage-shared-variables
  - name: buildConfiguration
    value: 'production'
  - name: nodeVersion
    value: '20.x'
  - name: pnpmVersion
    value: '9.12.2'
  - name: PNPM_STORE_PATH
    value: '$(Pipeline.Workspace)/.pnpm-store'
  - name: stagingAppServiceName
    value: 'mind-voyage-companion-staging-app-ja7cvi'
  - name: resourceGroupName
    value: 'mind-voyage-companion-staging-rg'
  - name: azureServiceConnection
    value: 'azure-staging-connection'
  - name: keyVaultName
    value: 'mv-staging-ja7cvi'

pool:
  vmImage: 'ubuntu-latest'

stages:
  # =============================================================================
  # BUILD AND TEST STAGE
  # =============================================================================
  - stage: BuildAndTest
    displayName: 'Build, Lint, and Test'
    jobs:
      - job: Build
        displayName: 'Build Application'
        steps:
          - checkout: self
            fetchDepth: '1'
            displayName: 'Checkout Repository'

          - task: NodeTool@0
            displayName: 'Setup Node.js $(nodeVersion)'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: |
              mkdir -p $(PNPM_STORE_PATH)
            displayName: 'Create pnpm store directory'

          - task: Cache@2
            displayName: 'Cache pnpm store'
            inputs:
              key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
              restoreKeys: |
                pnpm | "$(Agent.OS)"
              path: $(PNPM_STORE_PATH)

          - script: |
              corepack enable
              corepack prepare pnpm@$(pnpmVersion) --activate
              pnpm config set store-dir $(PNPM_STORE_PATH)
            displayName: 'Setup pnpm'

          - script: pnpm install --frozen-lockfile
            displayName: 'Install Dependencies'

          - script: pnpm type-check
            displayName: 'TypeScript Type Check'

          - script: pnpm lint
            displayName: 'ESLint Code Quality Check'

          - script: pnpm format:check
            displayName: 'Prettier Format Check'

          - script: pnpm test:run
            displayName: 'Run Unit Tests'
            env:
              CI: 'true'

          - task: PublishTestResults@2
            displayName: 'Publish Unit Test Results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results.xml'
              failTaskOnFailedTests: true

          - script: pnpm test:coverage
            displayName: 'Generate Test Coverage'
            env:
              CI: 'true'

          - task: PublishTestResults@2
            displayName: 'Publish Code Coverage Results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/coverage/junit.xml'
              mergeTestResults: true
              publishRunAttachments: true

          - script: |
              echo "Building Next.js application..."
              pnpm build
            displayName: 'Build Next.js Application'
            env:
              NODE_ENV: 'production'
              NEXTAUTH_URL: 'https://$(stagingAppServiceName).azurewebsites.net'
              # Build-time environment variables (non-sensitive)
              NEXT_TELEMETRY_DISABLED: '1'

          - script: |
              echo "Creating deployment package..."
              mkdir -p $(Build.ArtifactStagingDirectory)/deploy
              
              # Copy essential files for deployment
              cp -r .next $(Build.ArtifactStagingDirectory)/deploy/
              cp -r public $(Build.ArtifactStagingDirectory)/deploy/
              cp package.json $(Build.ArtifactStagingDirectory)/deploy/
              cp pnpm-lock.yaml $(Build.ArtifactStagingDirectory)/deploy/
              cp next.config.js $(Build.ArtifactStagingDirectory)/deploy/
              
              # Copy source files needed for production
              if [ -d "src" ]; then
                cp -r src $(Build.ArtifactStagingDirectory)/deploy/
              fi
              
              # Copy production dependencies only (no dev dependencies)
              echo "Installing production dependencies..."
              cd $(Build.ArtifactStagingDirectory)/deploy
              pnpm install --prod --frozen-lockfile
              
              echo "Deployment package created successfully"
              ls -la $(Build.ArtifactStagingDirectory)/deploy/
            displayName: 'Prepare Deployment Package'

          - task: ArchiveFiles@2
            displayName: 'Archive Build Artifacts'
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/deploy'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/mind-voyage-companion-$(Build.BuildId).zip'
              replaceExistingArchive: true
              verbose: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Build Artifacts'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact: 'build-artifacts'

      - job: SecurityScan
        displayName: 'Security and Dependency Scan'
        dependsOn: []
        steps:
          - checkout: self
            fetchDepth: '1'
            displayName: 'Checkout Repository'

          - task: NodeTool@0
            displayName: 'Setup Node.js $(nodeVersion)'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: |
              corepack enable
              corepack prepare pnpm@$(pnpmVersion) --activate
            displayName: 'Setup pnpm'

          - script: pnpm install --frozen-lockfile
            displayName: 'Install Dependencies'

          - script: pnpm audit --audit-level moderate
            displayName: 'Security Audit Dependencies'
            continueOnError: 'true'

  # =============================================================================
  # INTEGRATION TESTS STAGE
  # =============================================================================
  # - stage: IntegrationTests
  #   displayName: 'Integration and E2E Tests'
