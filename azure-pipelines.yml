  #           displayName: 'Setup pnpm'

  #         - script: pnpm install --frozen-lockfile
  #           displayName: 'Install Dependencies'

  #         - script: |
  #             pnpm exec playwright install --with-deps chromium
  #           displayName: 'Install Playwright Chromium Browser'

  #         - script: pnpm build
  #           displayName: 'Build Application for E2E Tests'
  #           env:
  #             NODE_ENV: 'production'

  #         - script: pnpm test:e2e
  #           displayName: 'Run Playwright E2E Tests'
  #           env:
  #             CI: 'true'

  #         - task: PublishTestResults@2
  #           displayName: 'Publish E2E Test Results'
  #           condition: succeededOrFailed()
  #           inputs:
  #             testResultsFormat: 'JUnit'
  #             testResultsFiles: '**/test-results/results.xml'
  #             failTaskOnFailedTests: true

  #         - script: |
  #             if [ -d "playwright-report" ]; then
  #               echo "Playwright report directory found"
  #               ls -la playwright-report/
  #             else
  #               echo "Playwright report directory not found, creating empty report"
  #               mkdir -p playwright-report
  #               echo "No E2E test reports generated" > playwright-report/no-reports.txt
  #             fi
  #           displayName: 'Prepare E2E Test Reports'
  #           condition: succeededOrFailed()
            
  #         - task: PublishPipelineArtifact@1
  #           displayName: 'Publish E2E Test Reports'
  #           condition: succeededOrFailed()
  #           inputs:
  #             targetPath: 'playwright-report'
  #             artifact: 'e2e-test-reports'

  # =============================================================================
  # STAGING DEPLOYMENT STAGE
  # =============================================================================
  - stage: DeployToStaging
    displayName: 'Deploy to Staging Environment'
    dependsOn: 
      - BuildAndTest
      # - IntegrationTests
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/develop'), eq(variables['Build.SourceBranch'], 'refs/heads/main')))
    variables:
      - group: mind-voyage-staging-variables
    jobs:
      - deployment: StagingDeployment
        displayName: 'Deploy to Staging'
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  displayName: 'Download Build Artifacts'
                  artifact: build-artifacts

                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure App Service (Staging)'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appType: 'webAppLinux'
                    appName: '$(stagingAppServiceName)'
                    runtimeStack: 'NODE|20-lts'
                    package: '$(Pipeline.Workspace)/build-artifacts/*.zip'
                    appSettings: '-NODE_ENV production -NEXTAUTH_URL https://$(stagingAppServiceName).azurewebsites.net -MONGODB_URI $(STAGING_MONGODB_URI) -NEXTAUTH_SECRET $(STAGING_NEXTAUTH_SECRET) -JWT_SECRET $(STAGING_JWT_SECRET) -NEXT_TELEMETRY_DISABLED 1'
                    startUpCommand: 'pnpm start'

                - task: AzureCLI@2
                  displayName: 'Restart Staging App Service'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az webapp restart --name mind-voyage-companion-staging-app-ja7cvi --resource-group mind-voyage-companion-staging-rg

                - script: |
                    echo "Waiting for application to start..."
                    sleep 30
                    curl -f https://mind-voyage-companion-staging-app-ja7cvi.azurewebsites.net/ || exit 1
                  displayName: 'Health Check - Staging Deployment'