# Next.js + MongoDB Boilerplate - Azure DevOps Pipeline
# CI/CD with staging auto-deploy and manual production approval

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - LOCAL_SETUP.md
      - DEPLOYMENT.md

pr:
  branches:
    include:
      - main
      - develop

variables:
  - name: nodeVersion
    value: '20.x'
  - name: pnpmVersion
    value: '9.12.2'
  - name: PNPM_STORE_PATH
    value: '$(Pipeline.Workspace)/.pnpm-store'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: BuildAndTest
    displayName: 'Build, Lint, and Test'
    jobs:
      - job: Build
        displayName: 'Build Application'
        steps:
          - checkout: self
            fetchDepth: '1'

          - task: NodeTool@0
            displayName: 'Setup Node.js'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: mkdir -p $(PNPM_STORE_PATH)
            displayName: 'Create pnpm store'

          - task: Cache@2
            displayName: 'Cache pnpm'
            inputs:
              key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
              restoreKeys: pnpm | "$(Agent.OS)"
              path: $(PNPM_STORE_PATH)

          - script: |
              corepack enable
              corepack prepare pnpm@$(pnpmVersion) --activate
              pnpm config set store-dir $(PNPM_STORE_PATH)
            displayName: 'Setup pnpm'

          - script: pnpm install --frozen-lockfile
            displayName: 'Install Dependencies'

          - script: pnpm type-check
            displayName: 'TypeScript Check'

          - script: pnpm lint
            displayName: 'ESLint'

          - script: pnpm format:check
            displayName: 'Prettier Check'

          - script: pnpm build
            displayName: 'Build Next.js'
            env:
              NODE_ENV: 'production'
              NEXT_TELEMETRY_DISABLED: '1'

          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/deploy
              cp -r .next public package.json pnpm-lock.yaml next.config.js $(Build.ArtifactStagingDirectory)/deploy/
              [ -d "src" ] && cp -r src $(Build.ArtifactStagingDirectory)/deploy/
              cd $(Build.ArtifactStagingDirectory)/deploy
              pnpm install --prod --shamefully-hoist --frozen-lockfile
            displayName: 'Prepare Deployment'

          - task: ArchiveFiles@2
            displayName: 'Archive Artifacts'
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/deploy'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
              replaceExistingArchive: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Artifacts'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact: 'build-artifacts'

      - job: SecurityScan
        displayName: 'Security Audit'
        dependsOn: []
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: |
              corepack enable
              corepack prepare pnpm@$(pnpmVersion) --activate
            displayName: 'Setup pnpm'

          - script: pnpm install --frozen-lockfile
            displayName: 'Install Dependencies'

          - script: pnpm audit --audit-level moderate
            displayName: 'Security Audit'
            continueOnError: 'true'

  - stage: DeployToStaging
    displayName: 'Deploy to Staging'
    dependsOn: BuildAndTest
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/develop'), eq(variables['Build.SourceBranch'], 'refs/heads/main')))
    jobs:
      - deployment: StagingDeployment
        displayName: 'Staging Deployment'
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: build-artifacts

                - script: echo "Configure Azure deployment here"
                  displayName: 'Deployment Placeholder'

  - stage: DeployToProduction
    displayName: 'Deploy to Production'
    dependsOn: DeployToStaging
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: ProductionDeployment
        displayName: 'Production Deployment'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: build-artifacts

                - script: echo "Configure Azure production deployment here"
                  displayName: 'Production Deployment Placeholder'
