# Mind Voyage Companion - MongoDB Configuration
# Optimized configuration for Docker deployment

# Network interfaces
net:
  port: 27017
  bindIp: 0.0.0.0  # Allow connections from any IP (Docker network)
  maxIncomingConnections: 100

# Storage configuration
storage:
  dbPath: /data/db
  journal:
    enabled: true
  engine: wiredTiger
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.25  # Limit cache for container environment
      journalCompressor: snappy
      directoryForIndexes: false
    collectionConfig:
      blockCompressor: snappy
    indexConfig:
      prefixCompression: true

# Logging
systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log
  quiet: false
  logRotate: reopen

# Process management
processManagement:
  fork: false  # Don't fork in container
  pidFilePath: /tmp/mongod.pid
  timeZoneInfo: /usr/share/zoneinfo

# Security
security:
  authorization: enabled
  javascriptEnabled: true

# Operation profiling (for performance monitoring)
operationProfiling:
  mode: slowOp
  slowOpThresholdMs: 100

# Replication (disabled for single instance)
# replication:
#   replSetName: "rs0"

# Sharding (disabled for single instance)
# sharding:
#   clusterRole: configsvr