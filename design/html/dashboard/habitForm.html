<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Habit - Mind Voyage Companion</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Feather Icons for UI -->
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0A;
        }
        .modal-card {
            background-color: #18181B; /* zinc-900 */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-input, .form-textarea, .form-select {
            background-color: #27272A; /* zinc-800 */
            border: 1px solid #3F3F46; /* zinc-700 */
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: #3B82F6; /* blue-500 */
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
        }
        .control-button {
            background-color: #27272A;
            border: 1px solid #3F3F46;
        }
        .control-button.active {
            background-color: #3B82F6;
            border-color: #3B82F6;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-900 text-white antialiased flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl modal-card rounded-2xl shadow-lg">
        <!-- Modal Header -->
        <div class="flex justify-between items-center p-6 border-b border-gray-700">
            <h2 class="text-xl font-bold text-gray-100">Create New Habit</h2>
            <button class="text-gray-500 hover:text-white transition-colors">
                <i data-feather="x" class="w-6 h-6"></i>
            </button>
        </div>

        <!-- Modal Body -->
        <div class="p-6 space-y-6 overflow-y-auto" style="max-height: 80vh;">
            <form action="#" class="space-y-6">
                <!-- Title -->
                <div>
                    <label for="habit-title" class="block text-sm font-medium text-gray-300 mb-2">Title *</label>
                    <input type="text" id="habit-title" placeholder="e.g., Morning Pages, Drink Water, Exercise" class="form-input w-full rounded-lg px-4 py-2">
                </div>

                <!-- Description -->
                <div>
                    <label for="habit-description" class="block text-sm font-medium text-gray-300 mb-2">Description</label>
                    <textarea id="habit-description" rows="3" placeholder="Optional description of your habit" class="form-textarea w-full rounded-lg px-4 py-2 resize-none"></textarea>
                </div>

                <!-- Emoji & Color -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Emoji</label>
                        <div class="grid grid-cols-6 gap-2 mb-2">
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">💧</button>
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">📚</button>
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">🚶</button>
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">💪</button>
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">🧘</button>
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">📝</button>
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">🏃</button>
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">🎵</button>
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">📱</button>
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">🌙</button>
                            <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">☀️</button>
                             <button type="button" class="text-2xl p-2 bg-gray-700/50 rounded-md hover:bg-gray-600/50">☕</button>
                        </div>
                        <input type="text" placeholder="Or type custom emoji" class="form-input w-full rounded-lg px-4 py-2">
                    </div>
                     <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Color</label>
                        <div class="grid grid-cols-6 gap-2 mb-2">
                            <button type="button" class="w-full h-10 rounded-md" style="background-color: #3B82F6;"></button>
                            <button type="button" class="w-full h-10 rounded-md" style="background-color: #10B981;"></button>
                            <button type="button" class="w-full h-10 rounded-md" style="background-color: #F59E0B;"></button>
                            <button type="button" class="w-full h-10 rounded-md" style="background-color: #EF4444;"></button>
                            <button type="button" class="w-full h-10 rounded-md" style="background-color: #8B5CF6;"></button>
                            <button type="button" class="w-full h-10 rounded-md" style="background-color: #EC4899;"></button>
                        </div>
                        <input type="text" value="#3B82F6" class="form-input w-full rounded-lg px-4 py-2">
                    </div>
                </div>

                <!-- Frequency -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2 flex items-center gap-2"><i data-feather="calendar" class="w-4 h-4"></i> Frequency</label>
                    <div class="flex gap-2">
                        <button type="button" class="control-button active flex-1 text-sm font-semibold py-2 px-4 rounded-lg">Daily</button>
                        <button type="button" class="control-button flex-1 text-sm font-semibold py-2 px-4 rounded-lg">Weekly</button>
                        <button type="button" class="control-button flex-1 text-sm font-semibold py-2 px-4 rounded-lg">Custom</button>
                    </div>
                </div>

                <!-- Target -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2 flex items-center gap-2"><i data-feather="target" class="w-4 h-4"></i> Target</label>
                    <div class="flex flex-wrap gap-2">
                        <button type="button" class="control-button text-sm font-semibold py-2 px-4 rounded-lg">Yes/No</button>
                        <button type="button" class="control-button active text-sm font-semibold py-2 px-4 rounded-lg">Count</button>
                        <button type="button" class="control-button text-sm font-semibold py-2 px-4 rounded-lg">Duration</button>
                        <button type="button" class="control-button text-sm font-semibold py-2 px-4 rounded-lg">Amount</button>
                    </div>
                </div>

                <!-- Additional Settings -->
                <div class="space-y-6 pt-4 border-t border-gray-700">
                     <h3 class="text-md font-semibold text-gray-200">Additional Settings</h3>
                     <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                         <div>
                             <label for="category" class="block text-sm font-medium text-gray-300 mb-2">Category</label>
                             <input type="text" id="category" placeholder="e.g., Health, Work, Personal" class="form-input w-full rounded-lg px-4 py-2">
                         </div>
                         <div>
                            <label for="priority" class="block text-sm font-medium text-gray-300 mb-2">Priority</label>
                            <select id="priority" class="form-select w-full rounded-lg px-4 py-2">
                                <option>Low</option>
                                <option selected>Medium</option>
                                <option>High</option>
                            </select>
                         </div>
                     </div>
                     <div>
                        <label for="reminder-time" class="block text-sm font-medium text-gray-300 mb-2">Reminder Time</label>
                        <input type="time" id="reminder-time" class="form-input w-full rounded-lg px-4 py-2">
                    </div>
                    <div>
                        <label for="notes" class="block text-sm font-medium text-gray-300 mb-2">Notes</label>
                        <textarea id="notes" rows="3" placeholder="Additional notes or motivation for this habit" class="form-textarea w-full rounded-lg px-4 py-2 resize-none"></textarea>
                    </div>
                </div>
            </form>
        </div>

        <!-- Modal Footer -->
        <div class="flex justify-end items-center gap-4 p-6 border-t border-gray-700">
            <button class="text-sm font-semibold text-gray-300 hover:bg-gray-700/50 py-2 px-5 rounded-lg transition-colors">Cancel</button>
            <button class="text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white py-2 px-5 rounded-lg transition-colors">Create Habit</button>
        </div>
    </div>


    <script>
        // Initialize Feather Icons
        feather.replace();
    </script>
</body>
</html>
